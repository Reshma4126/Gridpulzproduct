<!DOCTYPE html>
<html class="dark" lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>GRIDPULZ | Authentication Gateway</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Michroma&family=Josefin+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <script>
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "surface-variant": "#35343a",
                        "on-surface-variant": "#c3caac",
                        "surface-dim": "#131318",
                        "surface-container-highest": "#35343a",
                        "primary-fixed": "#b8f600",
                        "primary": "#ffffff",
                        "on-background": "#e4e1e9",
                        "on-surface": "#e4e1e9",
                        "outline": "#8d9479",
                        "background": "#131318",
                        "error": "#ffb4ab",
                        "surface": "#131318",
                        "surface-container": "#1f1f25",
                        "primary-container": "#b8f600",
                    },
                    fontFamily: {
                        "headline": ["Michroma", "sans-serif"],
                        "body": ["Josefin Sans", "sans-serif"],
                        "mono": ["Michroma", "sans-serif"]
                    }
                }
            }
        }
    </script>
    <style>
        body {
            font-family: 'Josefin Sans', sans-serif;
            background-color: #0A0A0F;
            color: #e4e1e9;
        }
        .font-headline, .font-michroma, h1, h2, h3, h4, h5, h6 {
            font-family: 'Michroma', sans-serif !important;
        }
        html, body {
            min-height: 100%;
            overflow-x: hidden;
            overflow-y: scroll;
        }
        body {
            -webkit-overflow-scrolling: touch;
        }
        .glass-panel {
            background: rgba(31, 31, 37, 0.6);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
        }
        .dot-grid {
            background-image: radial-gradient(rgba(184, 246, 0, 0.1) 1px, transparent 1px);
            background-size: 32px 32px;
        }
        .michroma-heading {
            font-family: 'Michroma', sans-serif;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-weight: 400;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 300, 'GRAD' 0, 'opsz' 24;
            vertical-align: middle;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade {
            animation: fadeIn 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }
    </style>
</head>
<body class="bg-[#0A0A0F] text-on-surface font-body min-h-screen py-6 py-10 flex items-start items-center justify-center relative min-w-[1440px] overflow-x-auto">
    <div class="dot-grid absolute inset-0 opacity-40 z-0"></div>
    <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[800px] h-[800px] bg-[#BFFF00] opacity-[0.03] blur-[150px] rounded-full pointer-events-none z-0"></div>

    <div class="glass-panel w-full max-w-md p-6 p-10 my-8 rounded-2xl border border-outline/20 relative z-10 shadow-[0_0_50px_rgba(0,0,0,0.5)] animate-fade">
        <div class="flex justify-center mb-8">
            <a href="index.html" class="hover:opacity-80 transition-opacity">
                <img src="assets/gridpulz_logo.png" alt="GridPulz" class="h-32 mix-blend-lighten">
            </a>
        </div>
        <h2 class="michroma-heading text-xl text-center mb-8 text-white">System Access</h2>

        <div class="flex bg-surface-container-highest p-1 rounded-lg mb-8 shadow-inner">
            <button id="tab-operator" class="flex-1 py-3 font-headline font-bold uppercase tracking-widest text-[10px] rounded bg-[#BFFF00] text-[#161e00] transition-colors shadow-sm" onclick="switchRole('operator')">Station Operator</button>
            <button id="tab-user" class="flex-1 py-3 font-headline font-bold uppercase tracking-widest text-[10px] rounded text-on-surface-variant hover:text-white transition-colors" onclick="switchRole('user')">EV Driver</button>
        </div>

        <form id="login-form" onsubmit="handleLogin(event)">
            <div class="space-y-4">
                <div>
                    <label class="block text-[10px] font-body uppercase tracking-widest text-on-surface-variant mb-2">Network Credentials (Email or Phone)</label>
                    <input id="login-email" type="text" required class="w-full bg-[#131318] border border-outline/30 rounded px-4 py-3 text-white focus:outline-none focus:border-[#BFFF00] focus:ring-1 focus:ring-[#BFFF00] transition-colors font-body text-sm" placeholder="operator@gridpulz.app or +91XXXXXXXXXX">
                </div>
                <div>
                    <div class="flex justify-between items-center mb-2">
                        <label class="block text-[10px] font-body uppercase tracking-widest text-on-surface-variant">Security Key (Password)</label>
                        <a href="#" class="text-[10px] font-body uppercase tracking-widest text-[#BFFF00] hover:underline">Reset Key?</a>
                    </div>
                    <input id="login-password" type="password" required class="w-full bg-[#131318] border border-outline/30 rounded px-4 py-3 text-white focus:outline-none focus:border-[#BFFF00] focus:ring-1 focus:ring-[#BFFF00] transition-colors font-body text-sm" placeholder="••••••••">
                </div>
                <button type="submit" class="w-full bg-[#BFFF00] text-[#161e00] font-headline font-bold uppercase tracking-widest py-4 rounded hover:bg-[#BFFF00]/90 hover:shadow-[0_0_15px_rgba(191,255,0,0.3)] transition-all flex items-center justify-center gap-2 mt-6 active:scale-95 group">
                    Authenticate <span class="material-symbols-outlined text-sm group-hover:translate-x-1 transition-transform">login</span>
                </button>
            </div>
        </form>

        <div class="mt-6 pt-6 border-t border-outline/20">
            <div class="text-center font-body uppercase tracking-widest text-[10px] text-on-surface-variant mb-4">NEW DETECTED IDENTITIES</div>
            <div class="flex flex-col gap-3">
                <a href="signup-operator.html" class="w-full border border-[#BFFF00]/30 text-[#BFFF00] font-headline font-bold uppercase tracking-widest text-[10px] py-4 rounded text-center hover:bg-[#BFFF00]/10 transition-colors">Register Station Node</a>
                <a href="signup-user.html" class="w-full border border-white/10 text-white font-headline font-bold uppercase tracking-widest text-[10px] py-4 rounded text-center hover:bg-white/5 transition-colors">Sign Up as EV Driver</a>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/supabase-config.js"></script>
    <script src="js/api-config.js"></script>
    <script src="js/auth.js"></script>
    <script>
        window.currentRole = 'operator';

        window.switchRole = function(role) {
            window.currentRole = role;
            const opBtn = document.getElementById('tab-operator');
            const usrBtn = document.getElementById('tab-user');

            const activeClass = 'flex-1 py-3 font-headline font-bold uppercase tracking-widest text-[10px] rounded bg-[#BFFF00] text-[#161e00] transition-colors shadow-sm';
            const inactiveClass = 'flex-1 py-3 font-headline font-bold uppercase tracking-widest text-[10px] rounded text-on-surface-variant hover:text-white transition-colors';

            if (role === 'operator') {
                opBtn.className = activeClass;
                usrBtn.className = inactiveClass;
            } else {
                usrBtn.className = activeClass;
                opBtn.className = inactiveClass;
            }
        };
    </script>
</body>
</html>
