<!DOCTYPE html>
<html class="dark" lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>GRIDPULZ | Driver Settings</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Michroma&family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" href="components/sidebar.css">
    <link rel="stylesheet" href="components/font-theme.css">
    <script>
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "surface-variant": "#35343a",
                        "on-surface-variant": "#c3caac",
                        "surface-dim": "#131318",
                        "primary-fixed": "#b8f600",
                        "on-background": "#e4e1e9",
                        "on-surface": "#e4e1e9",
                        "outline": "#8d9479",
                        "background": "#131318",
                        "error": "#ffb4ab",
                        "surface": "#131318",
                        "surface-container": "#1f1f25",
                        "neon": "#BFFF00"
                    },
                    fontFamily: {
                        "headline": ["Michroma", "monospace"],
                        "body": ["Poppins", "sans-serif"],
                        "mono": ["Michroma", "monospace"]
                    }
                }
            }
        }
    </script>
    <style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 300, 'GRAD' 0, 'opsz' 24;
            vertical-align: middle;
        }
        .dot-grid {
            background-image: radial-gradient(rgba(184, 246, 0, 0.06) 1px, transparent 1px);
            background-size: 32px 32px;
        }
        .glass-card {
            background: rgba(31, 31, 37, 0.55);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
        }
        .nav-link-active { background: rgba(191,255,0,0.1); border-color: rgba(191,255,0,0.3); color: #BFFF00; }

        /* Sidebar responsive margin */
        #main-content { 
            flex: 1; 
            padding: 0; 
            margin-left: 68px; 
            transition: margin-left 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .gp-sidebar.expanded + #main-content {
            margin-left: 220px;
        }
        @media (max-width: 768px) { 
            #main-content { margin-left: 0; } 
            .gp-sidebar.expanded + #main-content { margin-left: 0; }
        }
    </style>
</head>
<body class="bg-[#0A0A0F] text-on-surface font-body min-h-screen min-w-[1440px] overflow-x-auto">
    <div id="toast-container" class="fixed top-5 right-5 z-50 flex flex-col gap-3 pointer-events-none w-80"></div>

    <div class="flex min-h-screen">
        <aside class="gp-sidebar" id="main-sidebar">
            <div class="gp-sidebar__logo-zone">
                <div class="gp-sidebar__logo-mark">
                    <img src="assets/gridpulz_logo.png" alt="GridPulz Logo" class="w-8 h-8 object-contain">
                </div>
                <div class="gp-sidebar__brand">GridPulz</div>
            </div>
            <nav class="gp-sidebar__nav">
                <span class="gp-sidebar__sec-label">Main</span>
                <a href="user-dashboard.html" class="gp-sidebar__nav-item" data-page="user-dashboard">
                    <span class="gp-sidebar__nav-icon"><img src="assets/dashboard.png" alt="Dashboard"></span>
                    <span class="gp-sidebar__nav-label">Dashboard</span>
                </a>
                <a href="charge-now.html" class="gp-sidebar__nav-item" data-page="charge-now">
                    <span class="gp-sidebar__nav-icon"><img src="assets/chargenow.png" alt="Charge Now"></span>
                    <span class="gp-sidebar__nav-label">Charge Now</span>
                </a>
                <a href="prebook.html" class="gp-sidebar__nav-item" data-page="prebook">
                    <span class="gp-sidebar__nav-icon"><img src="assets/prebook.png" alt="Prebook"></span>
                    <span class="gp-sidebar__nav-label">Prebook</span>
                </a>
                <a href="station-map.html" class="gp-sidebar__nav-item" data-page="station-map">
                    <span class="gp-sidebar__nav-icon"><img src="assets/map.png" alt="Station Map"></span>
                    <span class="gp-sidebar__nav-label">Station Map</span>
                </a>
                <span class="gp-sidebar__sec-label">Config</span>
                <a href="my-bookings.html" class="gp-sidebar__nav-item" data-page="my-bookings">
                    <span class="gp-sidebar__nav-icon"><img src="assets/mybookings.png" alt="My Bookings"></span>
                    <span class="gp-sidebar__nav-label">My Bookings</span>
                </a>
                <a href="settings.html" class="gp-sidebar__nav-item" data-page="settings">
                    <span class="gp-sidebar__nav-icon"><img src="assets/settings.png" alt="Settings"></span>
                    <span class="gp-sidebar__nav-label">Settings</span>
                </a>
            </nav>
            <div class="gp-sidebar__separator"></div>
            <div class="gp-sidebar__logout-zone">
                <button class="gp-sidebar__nav-item logout" id="logout-btn">
                    <span class="gp-sidebar__nav-icon"><img src="assets/logout.png" alt="Logout"></span>
                    <span class="gp-sidebar__nav-label">Logout</span>
                </button>
            </div>
        </aside>

        <!-- ============ MAIN CONTENT ============ -->
        <main id="main-content" class="flex-1 relative dot-grid min-w-0 responsive-content">
            <div class="max-w-5xl mx-auto p-10 space-y-6">
                <div class="flex items-center gap-4">
                    <a href="user-dashboard.html" class="w-10 h-10 rounded-full bg-white/5 border border-white/10 flex items-center justify-center text-white/50 hover:text-white hover:bg-white/10 transition-colors">
                        <span class="material-symbols-outlined">arrow_back</span>
                    </a>
                    <h1 class="font-headline text-2xl font-bold text-white">Settings</h1>
                </div>

                <div class="glass-card rounded-2xl border border-white/5 p-6 space-y-5">
                    <div class="flex items-center gap-2">
                        <span class="material-symbols-outlined text-neon text-lg">tune</span>
                        <h2 class="font-headline font-bold text-sm uppercase tracking-widest text-white">Preferences</h2>
                    </div>

                    <div class="grid grid-cols-2 gap-4">
                        <label class="block">
                            <span class="block text-[10px] uppercase tracking-widest text-on-surface-variant/60 mb-2">Notifications</span>
                            <select class="w-full bg-[#1A1A24] border border-white/10 rounded-lg px-4 py-3 text-white text-sm focus:outline-none focus:border-neon focus:ring-1 focus:ring-neon">
                                <option>Enabled</option>
                                <option>Disabled</option>
                            </select>
                        </label>
                        <label class="block">
                            <span class="block text-[10px] uppercase tracking-widest text-on-surface-variant/60 mb-2">Theme</span>
                            <select class="w-full bg-[#1A1A24] border border-white/10 rounded-lg px-4 py-3 text-white text-sm focus:outline-none focus:border-neon focus:ring-1 focus:ring-neon">
                                <option>Dark</option>
                            </select>
                        </label>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/supabase-config.js"></script>
    <script src="js/api-config.js"></script>
    <script src="js/database.js"></script>
    <script src="js/stations-realtime.js"></script>
    <script src="js/dashboard.js"></script>
    <script src="components/sidebar.js"></script>
</body>
