<!-- VARIANT A: User Dashboard Sidebar -->

    <!-- Navigation -->
    <nav class="gp-sidebar__nav">

        <span class="gp-sidebar__sec-label">Main</span>
        
        <button class="gp-sidebar__nav-item active" data-page="dashboard">
            <span class="gp-sidebar__nav-icon">

            </span>
            <span class="gp-sidebar__nav-label">Prebook</span>
        </button>

        <button class="gp-sidebar__nav-item" data-page="station-map">
            <span class="gp-sidebar__nav-icon">
                <img src="assets/map.png" alt="Station Map icon">
            </span>
            <span class="gp-sidebar__nav-label">Station Map</span>
        </button>

        <!-- Config Section -->
        <span class="gp-sidebar__sec-label">Config</span>

        <button class="gp-sidebar__nav-item" data-page="my-bookings">
            <span class="gp-sidebar__nav-icon">
                <img src="assets/mybookings.png" alt="My Bookings icon">
            </span>

<!-- ============================================
     JAVASCRIPT IMPLEMENTATION
     Add this to your page's <script> section
     ============================================ -->
<script>
// Initialize sidebar interactions
function initGridPulzSidebar() {
    const sidebar = document.getElementById('main-sidebar');
    
    if (!sidebar) return;

    // Desktop: Hover to expand
    sidebar.addEventListener('mouseenter', () => {
        sidebar.classList.add('expanded');
    });

    sidebar.addEventListener('mouseleave', () => {
        sidebar.classList.remove('expanded');
    });

    // Mobile: Tap to toggle (tap on sidebar background)
    sidebar.addEventListener('click', (e) => {
        if (e.target === sidebar || e.target.closest('.gp-sidebar__nav') === sidebar.querySelector('.gp-sidebar__nav')) {
            sidebar.classList.toggle('expanded');
        }
    });

    // Nav item click handlers
    const navItems = sidebar.querySelectorAll('.gp-sidebar__nav-item:not(.logout)');
    navItems.forEach(item => {
        item.addEventListener('click', (e) => {
            e.stopPropagation();
            
            // Update active state
            navItems.forEach(i => i.classList.remove('active'));
            item.classList.add('active');

            // Navigate to page
            const page = item.dataset.page;
            if (page) {
                window.location.href = `${page}.html`;
            }
        });
    });

    // Logout handler
    const logoutBtn = sidebar.querySelector('.gp-sidebar__nav-item.logout');
    if (logoutBtn) {
        logoutBtn.addEventListener('click', handleLogout);
    }
}

// Logout function (implement your logic here)
function handleLogout() {
    console.log('Logout triggered');
    // Example: window.location.href = 'login.html';
    // Or call your logout API
}

// Initialize on page load
document.addEventListener('DOMContentLoaded', initGridPulzSidebar);

// Utility: Show alert badge
function showAlertBadge(count = 1) {
    const badge = document.getElementById('alerts-badge');
    if (badge) {
        badge.style.display = count > 0 ? 'block' : 'none';
    }
}

// Utility: Set active navigation item
function setActiveSidebarItem(pageName) {
    const sidebar = document.getElementById('main-sidebar');
    const items = sidebar.querySelectorAll('.gp-sidebar__nav-item:not(.logout)');
    items.forEach(item => {
        if (item.dataset.page === pageName) {
            item.classList.add('active');
        } else {
            item.classList.remove('active');
        }
    });
}

// Example: Show badge on alerts page if there are unread alerts
// Call this in your alerts.html page:
// showAlertBadge(unreadAlertsCount);
</script>
