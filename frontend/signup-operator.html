<!DOCTYPE html>
<html class="dark" lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>GRIDPULZ | Operator Registration</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Michroma&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <script>
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {"surface-variant": "#35343a","on-surface-variant": "#c3caac","surface-dim": "#131318","surface-container-highest": "#35343a","primary-fixed": "#b8f600","primary": "#ffffff","on-background": "#e4e1e9","on-surface": "#e4e1e9","outline": "#8d9479","background": "#131318","error": "#ffb4ab","surface": "#131318","surface-container": "#1f1f25","primary-container": "#b8f600",
                    },
                    fontFamily: {"headline": ["Michroma", "sans-serif"],"body": ["Michroma", "sans-serif"],"mono": ["Michroma", "sans-serif"]
                    }
                }
            }
        }
    </script>
    <style>
        body, body *:not(.material-symbols-outlined) {
            font-family: 'Michroma', sans-serif !important;
        }
        .glass-panel {
            background: rgba(31, 31, 37, 0.6);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
        }
        .dot-grid {
            background-image: radial-gradient(rgba(184, 246, 0, 0.1) 1px, transparent 1px);
            background-size: 32px 32px;
        }
        .michroma-heading {
            font-family: 'Michroma', sans-serif;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-weight: 400;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 300, 'GRAD' 0, 'opsz' 24;
            vertical-align: middle;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade {
            animation: fadeIn 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }
    </style>
</head>
<body class="bg-[#0A0A0F] text-on-surface font-body min-h-screen relative overflow-y-auto min-w-[1440px] overflow-x-auto">
    <div class="dot-grid absolute inset-0 opacity-40 z-0 pointer-events-none"></div>
    <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[1000px] h-[1000px] bg-[#BFFF00] opacity-[0.02] blur-[150px] rounded-full pointer-events-none z-0"></div>

    <nav id="navbar" class="bg-[#131318]/80 backdrop-blur-md top-0 sticky z-50 transition-all duration-300 border-b border-white/5">
        <div class="flex justify-between items-center w-full px-8 py-5 max-w-[1440px] mx-auto">
            <div class="flex items-center">
                <a href="index.html" class="hover:opacity-80 transition-opacity">
                    <img src="assets/gridpulz_logo.png" alt="GridPulz Logo" class="h-20 w-auto mix-blend-lighten">
                </a>
            </div>
            <div class="flex items-center gap-10">
                <a class="font-body text-sm uppercase tracking-widest text-[#C3CAAC] hover:text-[#FFFFFF] transition-colors" href="index.html">Home</a>
                <a class="font-body text-sm uppercase tracking-widest text-[#C3CAAC] hover:text-[#FFFFFF] transition-colors" href="about.html">About</a>
                <a class="font-body text-sm uppercase tracking-widest text-[#C3CAAC] hover:text-[#FFFFFF] transition-colors" href="features.html">Features</a>
                <a class="font-body text-sm uppercase tracking-widest text-[#C3CAAC] hover:text-[#FFFFFF] transition-colors" href="contact.html">Contact</a>
            </div>
            <a href="login.html" class="bg-primary-container text-[#161e00] font-headline font-bold px-6 py-2 rounded-lg active:scale-90 transition-all hover:bg-[#BFFF00]/90 hover:shadow-[0_0_15px_rgba(191,255,0,0.3)] uppercase tracking-widest text-xs">
                Portal Access
            </a>
        </div>
    </nav>

    <main class="relative z-10 py-6 py-12 px-4 flex items-start items-center justify-center min-h-[calc(100vh-108px)]">
    <div class="glass-panel w-full max-w-3xl p-6 p-10 my-6 rounded-2xl border border-[#BFFF00]/30 relative z-10 shadow-[0_0_50px_rgba(191,255,0,0.1)] animate-fade">
        <h2 class="michroma-heading text-2xl text-center mb-2 text-[#BFFF00]">Deploy Station Node</h2>
        <p class="text-center font-body text-xs text-on-surface-variant mb-10">Join the intelligent EV grid. Register your charging infrastructure.</p>

        <form id="signup-operator" onsubmit="handleOperatorSignup(event)">
            <div class="grid grid-cols-2 gap-6 mb-6">
                <div class="space-y-4">
                    <div>
                        <label class="block text-[10px] font-body uppercase tracking-widest text-on-surface-variant mb-2">Company / Station Name *</label>
                        <input id="name" type="text" required class="w-full bg-[#131318] border border-outline/30 rounded px-4 py-3 text-white focus:outline-none focus:border-[#BFFF00] focus:ring-1 focus:ring-[#BFFF00] transition-colors font-body text-sm" placeholder="e.g. Apex Charging LLC">
                    </div>
                    <div>
                        <label class="block text-[10px] font-body uppercase tracking-widest text-on-surface-variant mb-2">Administrator Email *</label>
                        <input id="email" type="email" required class="w-full bg-[#131318] border border-outline/30 rounded px-4 py-3 text-white focus:outline-none focus:border-[#BFFF00] focus:ring-1 focus:ring-[#BFFF00] transition-colors font-body text-sm" placeholder="admin@apexcharge.com">
                    </div>
                    <div>
                        <label class="block text-[10px] font-body uppercase tracking-widest text-on-surface-variant mb-2">Access Password *</label>
                        <input id="password" type="password" required class="w-full bg-[#131318] border border-outline/30 rounded px-4 py-3 text-white focus:outline-none focus:border-[#BFFF00] focus:ring-1 focus:ring-[#BFFF00] transition-colors font-body text-sm" placeholder="••••••••">
                    </div>
                    <div>
                        <label class="block text-[10px] font-body uppercase tracking-widest text-on-surface-variant mb-2">Contact *</label>
                        <input id="contact" type="text" required class="w-full bg-[#131318] border border-outline/30 rounded px-4 py-3 text-white focus:outline-none focus:border-[#BFFF00] focus:ring-1 focus:ring-[#BFFF00] transition-colors font-body text-sm" placeholder="e.g. +91XXXXXXXXXX">
                    </div>
                    <div>
                        <label class="block text-[10px] font-body uppercase tracking-widest text-on-surface-variant mb-2">Address *</label>
                        <input id="address" type="text" required class="w-full bg-[#131318] border border-outline/30 rounded px-4 py-3 text-white focus:outline-none focus:border-[#BFFF00] focus:ring-1 focus:ring-[#BFFF00] transition-colors font-body text-sm" placeholder="e.g. 123 Main street Coimbatore">
                    </div>
                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="block text-[10px] font-body uppercase tracking-widest text-on-surface-variant mb-2">Latitude *</label>
                            <input id="latitude" type="number" step="0.000001" required class="w-full bg-[#131318] border border-outline/30 rounded px-4 py-3 text-white focus:outline-none focus:border-[#BFFF00] focus:ring-1 focus:ring-[#BFFF00] transition-colors font-body text-sm" placeholder="Auto detected">
                        </div>
                        <div>
                            <label class="block text-[10px] font-body uppercase tracking-widest text-on-surface-variant mb-2">Longitude *</label>
                            <input id="longitude" type="number" step="0.000001" required class="w-full bg-[#131318] border border-outline/30 rounded px-4 py-3 text-white focus:outline-none focus:border-[#BFFF00] focus:ring-1 focus:ring-[#BFFF00] transition-colors font-body text-sm" placeholder="Auto detected">
                        </div>
                    </div>
                </div>

                <div class="space-y-4 bg-[#131318] p-4 rounded border border-outline/10">
                    <div class="mb-4 pb-2 border-b border-outline/10 font-headline font-bold text-xs uppercase tracking-widest text-white">Grid Parameters</div>
                    <div>
                        <label class="block text-[10px] font-body uppercase tracking-widest text-on-surface-variant mb-2">Total Charging Points *</label>
                        <input id="num_plugs" type="number" min="1" required class="w-full bg-[#0A0A0F] border border-outline/30 rounded px-4 py-3 text-[#BFFF00] font-mono focus:outline-none focus:border-[#BFFF00] focus:ring-1 focus:ring-[#BFFF00] transition-colors text-sm" placeholder="e.g. 12">
                    </div>
                    <div>
                        <label class="block text-[10px] font-body uppercase tracking-widest text-on-surface-variant mb-2">Charging Type *</label>
                        <input id="charging_type" type="text" required class="w-full bg-[#0A0A0F] border border-outline/30 rounded px-4 py-3 text-white focus:outline-none focus:border-[#BFFF00] focus:ring-1 focus:ring-[#BFFF00] transition-colors font-body text-sm" placeholder="e.g. AC/DC">
                    </div>
                    <div>
                        <label class="block text-[10px] font-body uppercase tracking-widest text-on-surface-variant mb-2">Connector Type *</label>
                        <select id="connector_type" class="w-full bg-[#0A0A0F] border border-outline/30 rounded px-4 py-3 text-white focus:outline-none focus:border-[#BFFF00] focus:ring-1 focus:ring-[#BFFF00] transition-colors font-body text-sm">
                            <option value="ccs">CCS / Level 3 Fast</option>
                            <option value="chademo">CHAdeMO</option>
                            <option value="type2">Type 2 / Level 2 AC</option>
                            <option value="mixed">Mixed Support Stack</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-[10px] font-body uppercase tracking-widest text-on-surface-variant mb-2">Total Capacity (kV) *</label>
                        <input id="total_capacity_kv" type="number" min="1" step="0.1" required class="w-full bg-[#0A0A0F] border border-outline/30 rounded px-4 py-3 text-[#BFFF00] font-mono focus:outline-none focus:border-[#BFFF00] focus:ring-1 focus:ring-[#BFFF00] transition-colors text-sm" placeholder="e.g. 239.1">
                    </div>
                    <div>
                        <label class="block text-[10px] font-body uppercase tracking-widest text-on-surface-variant mb-2">Voltage *</label>
                        <input id="voltage" type="number" min="1" step="0.1" required class="w-full bg-[#0A0A0F] border border-outline/30 rounded px-4 py-3 text-[#BFFF00] font-mono focus:outline-none focus:border-[#BFFF00] focus:ring-1 focus:ring-[#BFFF00] transition-colors text-sm" placeholder="e.g. 7.2">
                    </div>
                    <div>
                        <label class="block text-[10px] font-body uppercase tracking-widest text-on-surface-variant mb-2">Max Current *</label>
                        <input id="max_current" type="number" min="1" step="0.1" required class="w-full bg-[#0A0A0F] border border-outline/30 rounded px-4 py-3 text-[#BFFF00] font-mono focus:outline-none focus:border-[#BFFF00] focus:ring-1 focus:ring-[#BFFF00] transition-colors text-sm" placeholder="e.g. 100">
                    </div>
                    <div>
                        <label class="block text-[10px] font-body uppercase tracking-widest text-on-surface-variant mb-2">Meter Available *</label>
                        <select id="meter_available" class="w-full bg-[#0A0A0F] border border-outline/30 rounded px-4 py-3 text-white focus:outline-none focus:border-[#BFFF00] focus:ring-1 focus:ring-[#BFFF00] transition-colors font-body text-sm">
                            <option value="true">Yes</option>
                            <option value="false">No</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-[10px] font-body uppercase tracking-widest text-on-surface-variant mb-2">Communication Type *</label>
                        <input id="communication_type" type="text" required class="w-full bg-[#0A0A0F] border border-outline/30 rounded px-4 py-3 text-white focus:outline-none focus:border-[#BFFF00] focus:ring-1 focus:ring-[#BFFF00] transition-colors font-body text-sm" placeholder="e.g. MQTT">
                    </div>
                    <div>
                        <label class="block text-[10px] font-body uppercase tracking-widest text-on-surface-variant mb-2">Operating Hours *</label>
                        <input id="operating_hours" type="text" required class="w-full bg-[#0A0A0F] border border-outline/30 rounded px-4 py-3 text-white focus:outline-none focus:border-[#BFFF00] focus:ring-1 focus:ring-[#BFFF00] transition-colors font-body text-sm" placeholder="e.g. 24/7">
                    </div>
                    <div>
                        <label class="block text-[10px] font-body uppercase tracking-widest text-on-surface-variant mb-2">Average Usage *</label>
                        <input id="avg_usage" type="number" min="0" step="0.1" required class="w-full bg-[#0A0A0F] border border-outline/30 rounded px-4 py-3 text-[#BFFF00] font-mono focus:outline-none focus:border-[#BFFF00] focus:ring-1 focus:ring-[#BFFF00] transition-colors text-sm" placeholder="e.g. 72.5">
                    </div>
                </div>
            </div>

            <button type="submit" class="w-full bg-[#BFFF00] text-[#161e00] font-headline font-bold uppercase tracking-widest py-4 rounded hover:bg-[#BFFF00]/90 hover:shadow-[0_0_20px_rgba(191,255,0,0.4)] transition-all flex items-center justify-center gap-2 mt-4 active:scale-95 group">
                Establish Node <span class="material-symbols-outlined text-sm group-hover:translate-x-1 transition-transform">add_task</span>
            </button>
        </form>

        <div class="mt-8 pt-6 border-t border-outline/20 text-center">
            <a href="login.html" class="font-body text-xs text-on-surface-variant hover:text-white transition-colors">Already have a station registered? <span class="text-[#BFFF00] uppercase tracking-widest font-bold ml-1">Authenticate Here</span></a>
        </div>
    </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/supabase-config.js"></script>
    <script src="js/api-config.js"></script>
    <script src="js/auth.js"></script>
    <script>
        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(
                function(pos) {
                    const lat = document.getElementById('latitude');
                    const lng = document.getElementById('longitude');
                    if (lat) lat.value = Number(pos.coords.latitude).toFixed(6);
                    if (lng) lng.value = Number(pos.coords.longitude).toFixed(6);
                },
                function() {
                    // leave manual input if geolocation is blocked
                }
            );
        }
    </script>
</body>
</html>
